name: Scheduled Nightly Shutdown

on:
  schedule:
    # 09:00 UTC daily ≈ 7-8pm AEST/AEDT
    - cron: "0 9 * * *"
  workflow_dispatch: {}

env:
  CLUSTERS: >-
    pl-stats-rg:plstats-aks
    plinfra-dev-rg:plinfra-dev-aks
    plinfra-staging-rg:plinfra-staging-aks

jobs:
  shutdown:
    name: Stop non-production clusters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Stop each cluster
        run: |
          chmod +x scripts/manage-cluster.sh
          for entry in $CLUSTERS; do
            rg="${entry%%:*}"
            cluster="${entry##*:}"
            ./scripts/manage-cluster.sh stop "$rg" "$cluster"
          done